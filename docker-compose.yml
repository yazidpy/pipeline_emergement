name: emargement-project

services:
  postgres:
    # 18+ impose un layout de données différent ; 16 reste stable pour /var/lib/postgresql/data
    image: postgres:16
    container_name: emargement-postgres
    restart: unless-stopped
    env_file:
      - .env
    # Port hôte par défaut 5433 : évite le conflit avec un PostgreSQL Windows sur 5432.
    # À l'intérieur du réseau Docker, le service reste postgres:5432.
    ports:
      - "${POSTGRES_PUBLISH_PORT:-5433}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./database:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 20

  airflow-init:
    image: apache/airflow:2.10.2
    container_name: emargement-airflow-init
    depends_on:
      postgres:
        condition: service_healthy
    env_file:
      - .env
    environment:
      AIRFLOW__CORE__LOAD_EXAMPLES: "false"
      AIRFLOW__CORE__DAGS_ARE_PAUSED_AT_CREATION: "true"
      AIRFLOW__CORE__DAGBAG_IMPORT_TIMEOUT: "60"
    volumes:
      - ./dags:/opt/airflow/dags
      - airflow_logs:/opt/airflow/logs
      - airflow_plugins:/opt/airflow/plugins
    entrypoint:
      - /bin/bash
      - -c
      - >
        airflow db migrate &&
        airflow users create --username admin --firstname Admin --lastname User --role Admin --email admin@example.com --password admin

  airflow-webserver:
    image: apache/airflow:2.10.2
    container_name: emargement-airflow-webserver
    restart: unless-stopped
    depends_on:
      airflow-init:
        condition: service_completed_successfully
    env_file:
      - .env
    environment:
      AIRFLOW__CORE__LOAD_EXAMPLES: "false"
      AIRFLOW__WEBSERVER__EXPOSE_CONFIG: "true"
    ports:
      - "8080:8080"
    volumes:
      - ./dags:/opt/airflow/dags
      - airflow_logs:/opt/airflow/logs
      - airflow_plugins:/opt/airflow/plugins
    command: webserver

  airflow-scheduler:
    image: apache/airflow:2.10.2
    container_name: emargement-airflow-scheduler
    restart: unless-stopped
    depends_on:
      airflow-init:
        condition: service_completed_successfully
    env_file:
      - .env
    environment:
      AIRFLOW__CORE__LOAD_EXAMPLES: "false"
    volumes:
      - ./dags:/opt/airflow/dags
      - airflow_logs:/opt/airflow/logs
      - airflow_plugins:/opt/airflow/plugins
    command: scheduler

  spark-master:
    # bitnami/spark tags retirés du Hub (2025+) — image figée Bitnami Legacy
    image: bitnamilegacy/spark:3.5
    container_name: emargement-spark-master
    restart: unless-stopped
    environment:
      - SPARK_MODE=master
    ports:
      - "7077:7077"
      - "8081:8080"

  spark-worker:
    image: bitnamilegacy/spark:3.5
    container_name: emargement-spark-worker
    restart: unless-stopped
    depends_on:
      - spark-master
    environment:
      - SPARK_MODE=worker
      - SPARK_MASTER_URL=spark://spark-master:7077

volumes:
  postgres_data:
  airflow_logs:
  airflow_plugins:
